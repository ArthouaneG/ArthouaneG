<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 660" width="750" height="660">
  <defs>
    <style>
      .t { font-family: 'Courier New', Courier, monospace; font-size: 13px; }

      /* Each line fades in at its scheduled delay */
      .line { opacity: 0; animation: appear 0s forwards; }

      @keyframes appear { to { opacity: 1; } }

      .l01 { animation-delay: 0.3s; }
      .l02 { animation-delay: 0.8s; }
      .l04 { animation-delay: 1.1s; }
      .l06 { animation-delay: 1.3s; }
      .l07 { animation-delay: 1.45s; }
      .l08 { animation-delay: 1.6s; }
      .l09 { animation-delay: 1.75s; }
      .l10 { animation-delay: 1.9s; }
      .l11 { animation-delay: 2.05s; }
      .l13 { animation-delay: 2.25s; }
      .l15 { animation-delay: 2.45s; }
      .l16 { animation-delay: 2.6s; }
      .l17 { animation-delay: 2.75s; }
      .l18 { animation-delay: 2.9s; }
      .l20 { animation-delay: 3.1s; }
      .l22 { animation-delay: 3.3s; }
      .l23 { animation-delay: 3.45s; }
      .l24 { animation-delay: 3.6s; }
      .l26 { animation-delay: 3.8s; }
      .l28 { animation-delay: 4.0s; }
      .l29 { animation-delay: 4.15s; }
      .l30 { animation-delay: 4.3s; }
      .l32 { animation-delay: 4.55s; }
      .l33 { animation-delay: 5.0s; }

      /* Blinking cursor */
      .cursor {
        animation: blink 1s step-start 5.0s infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Color classes */
      .green  { fill: #3fb950; }
      .blue   { fill: #58a6ff; }
      .orange { fill: #f0883e; }
      .white  { fill: #e6edf3; }
      .gray   { fill: #c9d1d9; }
      .dim    { fill: #484f58; }
      .value  { fill: #79c0ff; }
      .at     { fill: #8b949e; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="750" height="660" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="750" height="32" rx="10" fill="#161b22"/>
  <rect y="24" width="750" height="8" fill="#161b22"/>

  <!-- Window buttons -->
  <circle cx="18" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="37" cy="16" r="6" fill="#febc2e"/>
  <circle cx="56" cy="16" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="375" y="21" text-anchor="middle" class="t dim" font-size="11">arthouane — ~/github — zsh</text>

  <!-- ============================================================ -->
  <!-- TERMINAL CONTENT                                              -->
  <!-- y = 55 + (line_index * 18)                                   -->
  <!-- ============================================================ -->

  <!-- L1 y=55 -->
  <text x="15" y="55" class="t line l01">
    <tspan class="green">(arthouane</tspan><tspan class="at">@</tspan><tspan class="green">github)</tspan><tspan class="gray">-</tspan><tspan class="blue">[~]</tspan>
  </text>

  <!-- L2 y=73 -->
  <text x="15" y="73" class="t line l02">
    <tspan class="orange"># </tspan><tspan class="white">whoami</tspan>
  </text>

  <!-- L4 y=109 -->
  <text x="15" y="109" class="t line l04">
    <tspan class="dim">  -- </tspan><tspan class="blue">Arthouane Gillekens</tspan><tspan class="dim"> ------------------------------------------------</tspan>
  </text>

  <!-- L6 y=145 -->
  <text x="15" y="145" class="t line l06">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Status: </tspan><tspan class="dim">................ </tspan><tspan class="value">Futur etudiant en Genie logiciel @ ETS</tspan>
  </text>

  <!-- L7 y=163 -->
  <text x="15" y="163" class="t line l07">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Previous: </tspan><tspan class="dim">.............. </tspan><tspan class="value">DEC Techniques de l informatique (Cegep)</tspan>
  </text>

  <!-- L8 y=181 -->
  <text x="15" y="181" class="t line l08">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Certification: </tspan><tspan class="dim">......... </tspan><tspan class="value">Cisco CCNA3</tspan>
  </text>

  <!-- L9 y=199 -->
  <text x="15" y="199" class="t line l09">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Age: </tspan><tspan class="dim">................... </tspan><tspan class="value">20 ans, quelques mois, et beaucoup de nuits blanches</tspan>
  </text>

  <!-- L10 y=217 -->
  <text x="15" y="217" class="t line l10">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Activity: </tspan><tspan class="dim">.............. </tspan><tspan class="value">30 commits cette annee</tspan>
  </text>

  <!-- L11 y=235 -->
  <text x="15" y="235" class="t line l11">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Currently playing: </tspan><tspan class="dim">..... </tspan><tspan class="value">frenchcore - beats to code/study to</tspan>
  </text>

  <!-- L13 y=271 -->
  <text x="15" y="271" class="t line l13">
    <tspan class="dim">  -- </tspan><tspan class="blue">Stack</tspan><tspan class="dim"> ---------------------------------------------------------------</tspan>
  </text>

  <!-- L15 y=307 -->
  <text x="15" y="307" class="t line l15">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Embedded: </tspan><tspan class="dim">.............. </tspan><tspan class="value">ESP32, Arduino, BLE / Wi-Fi</tspan>
  </text>

  <!-- L16 y=325 -->
