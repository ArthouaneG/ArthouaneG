  </text>

  <!-- L22 y=433 -->
  <text x="15" y="433" class="t line l22">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Audio Transmitter ESP .. </tspan><tspan class="value">Real-time audio over BLE, ESP32 -&gt; Android</tspan>
  </text>

  <!-- L23 y=451 -->
  <text x="15" y="451" class="t line l23">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Android Soundboard ..... </tspan><tspan class="value">Kotlin/Compose app with Room database</tspan>
  </text>

  <!-- L24 y=469 -->
  <text x="15" y="469" class="t line l24">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> BLE LED Controller ..... </tspan><tspan class="value">Remote LED control via Bluetooth Low Energy</tspan>
  </text>

  <!-- L26 y=505 -->
  <text x="15" y="505" class="t line l26">
    <tspan class="dim">  -- </tspan><tspan class="blue">Frequencies I vibe at</tspan><tspan class="dim"> ----------------------------------------------</tspan>
  </text>

  <!-- L28 y=541 -->
  <text x="15" y="541" class="t line l28">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> 432 Hz </tspan><tspan class="dim">................. </tspan><tspan class="value">Deep focus, late-night debugging sessions</tspan>
  </text>

  <!-- L29 y=559 -->
  <text x="15" y="559" class="t line l29">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> 808 Hz </tspan><tspan class="dim">................. </tspan><tspan class="value">Bass drops when the build finally compiles</tspan>
  </text>

  <!-- L30 y=577 -->
  <text x="15" y="577" class="t line l30">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> 44100 Hz </tspan><tspan class="dim">............... </tspan><tspan class="value">Sample rate of a perfect commit</tspan>
  </text>

  <!-- L32 y=613 -->
  <text x="15" y="613" class="t line l32">
    <tspan class="green">(arthouane</tspan><tspan class="at">@</tspan><tspan class="green">github)</tspan><tspan class="gray">-</tspan><tspan class="blue">[~]</tspan>
  </text>

  <!-- L33 y=631 — cursor -->
  <text x="15" y="631" class="t line l33">
