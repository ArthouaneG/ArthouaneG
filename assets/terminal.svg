      .l33 { animation-delay: 5.0s; }

      /* Palette: #210B2C #55286F #BC96E6 #D8B4E2 #AE759F */
      .p-prompt  { fill: #BC96E6; } /* Wisteria     — prompt, brackets   */
      .p-section { fill: #D8B4E2; } /* Pink Orchid  — section names, values */
      .p-accent  { fill: #AE759F; } /* Petal Pink   — # command, bullet * */
      .p-key     { fill: #BC96E6; } /* Wisteria     — key labels           */
      .p-dim     { fill: #55286F; } /* Velvet Orchid — dots, separators   */
      .p-value   { fill: #D8B4E2; } /* Pink Orchid  — info values          */

      /* Cursor */
      .cursor { fill: #BC96E6; animation: blink 1s step-start 5.0s infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

