    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Languages: </tspan><tspan class="dim">............. </tspan><tspan class="value">C/C++, Kotlin, Python, C#, JavaScript</tspan>
  </text>

  <!-- L18 y=361 -->
  <text x="15" y="361" class="t line l18">
    <tspan class="dim">  </tspan><tspan class="green">*</tspan><tspan class="gray"> Web: </tspan><tspan class="dim">................... </tspan><tspan class="value">HTML, CSS, React, TailwindCSS</tspan>
  </text>

  <!-- L20 y=397 -->
